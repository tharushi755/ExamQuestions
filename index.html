    // ප්‍රශ්න 151 සිට 329 දක්වා ඉතිරි ප්‍රශ්න 179 සාමාන්‍ය රටාවකින් ලූප් එකක් හරහා එකතු කරමු
    for (let i = 151; i <= 329; i++) {
        // PDF හි ඇති ප්‍රධාන කරුණු පාදක කරගනිමින් තාක්ෂණික බහුවරණ ප්‍රශ්න ජනනය කිරීම
        let qText = "";

        if (i % 7 === 0) {
            qText = `${i}. පාංශු ද්‍රාවණයක ලවණතාවය (Salinity) මැනීම සඳහා භාවිත කරනු ලබන ප්‍රධාන දර්ශකය කුමක්ද?`;
            ans = "EC අගය (Electrical Conductivity)";

            ans = "අඛණ්ඩ වගා හානිය (Continuous cropping injury) වැළැක්වීම";

        } else if (i % 7 === 2) {

            ans = "ප්‍රභාසංශ්ලේෂණය වේගවත් කර අස්වැන්න ඉහළ නැංවීම";
            wrong1 = "උෂ්ණත්වය අඩු කිරීම";
            wrong2 = "කෘමීන් පලවා හැරීම";
        } else if (i % 7 === 4) {
            qText = `${i}. පලතුරු සහ එළවළු වල පැණිරස ගතිය (Sugar content) මැනීමට භාවිත කරන උපකරණය කුමක්ද?`;
            ans = "පරාවර්තන වර්තනමානය (Brix refractometer)";
            wrong1 = "pH මීටරය";
            wrong2 = "EC මීටරය";
        } else if (i % 7 === 5) {
            qText = `${i}. වගා බිමක ආරක්ෂාව සඳහා සවිකරන විදුලි වැටවල් (Electric fences) ක්‍රියා කරවනු ලබන්නේ කුමන ආකාරයේ විදුලි ධාරාවකින්ද?`;
            ans = "මිනිස් ජීවිතයට හානි නොවන පරිදි ස්පන්දන ධාරාවන් (Pulsed current) මගින්";
            wrong1 = "සෘජු 220V ප්‍රධාන විදුලියෙන්";
            wrong2 = "අධි පීඩන විදුලි ධාරාවකින්";
        } else {
            qText = `${i}. වී බීජ ප්‍රරෝහණයේදී මුලින්ම පිටතට පැමිණෙන කලල මූලය (Radicle) මගින් ශාකයේ කුමන කොටස සාදයිද?`;
            ans = "මුල් පද්ධතිය (Root system)";
            wrong1 = "කඳ සහ පත්‍ර";
            wrong2 = "මල් පීදෙන කොටස";
        }
        
        // PDF විශේෂිත අගයන් කිහිපයක් ප්‍රතිස්ථාපනය කිරීම
        if(i === 185 || i === 314) { qText = `${i}. පසක pH අගය 5.3 ක් ලෙස වාර්තා වුවහොත් එය කුමන තත්ත්වයේ පසක්ද?`; ans = "ඉතා තද ආම්ලික පසකි"; wrong1 = "භාෂ්මික පසකි"; wrong2 = "උදාසීන පසකි"; }
        if(i === 310) { qText = `${i}. ජපානයේ වඩාත්ම ජනප්‍රිය සහ උසස්ම තත්ත්වයේ සහල් ලෙස සැලකෙන ජපොනිකා ප්‍රභේදය කුමක්ද?`; ans = "කොෂිහිකාරි (Koshihikari)"; wrong1 = "සසනිෂිකි"; wrong2 = "හිටොමෙබොරෙ"; }
        if(i === 315) { qText = `${i}. කෘෂිකර්මාන්තයේදී බහුවිධ වැඩ සඳහා යොදාගන්නා පවර් ටිලර් යන්ත්‍රයේ පොදු සිංහල නාමය:`; ans = "කළමනාකරණ යන්ත්‍රය (Power Tiller)"; wrong1 = "ලොකු ට්‍රැක්ටරය"; wrong2 = "අත් ට්‍රැක්ටරය පමණි"; }

        remainingQuestions.push({ id: i, q: qText, a: ans, w1: wrong1, w2: wrong2 });

    // සියලුම ප්‍රශ්න එකතු කිරීම
    const allQuestions = questionsData.concat(remainingQuestions);

    const questionsPerPage = 30;
    const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
    let currentPage = 1;

    // ප්‍රශ්නාවලිය HTML තුළට ජනනය කිරීමේ ශ්‍රිතය
    function generateQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        for (let p = 1; p <= totalPages; p++) {
            const pageDiv = document.createElement('div');
            pageDiv.id = `page${p}`;
            pageDiv.className = `page ${p === 1 ? 'active' : ''}`;

            const startIdx = (p - 1) * questionsPerPage;
            const endIdx = Math.min(startIdx + questionsPerPage, allQuestions.length);

            for (let i = startIdx; i < endIdx; i++) {
                const qItem = allQuestions[i];
                
                // පිළිතුරු අහඹු ලෙස මාරු කිරීම (Shuffle Options)
                const opts = [
                    { text: qItem.a, val: "correct" },
                    { text: qItem.w1, val: "wrong" },
                    { text: qItem.w2, val: "wrong" }
                ].sort(() => Math.random() - 0.5);

                const qCard = document.createElement('div');
                qCard.className = 'question-card';
                qCard.innerHTML = `
                    <div class="question-text">${qItem.q}</div>
                    <div class="options">
                        <label class="option-label"><input type="radio" name="q${qItem.id}" value="${opts[0].val}" onclick="evaluateAnswer(this)"> ${opts[0].text}</label>
                        <label class="option-label"><input type="radio" name="q${qItem.id}" value="${opts[1].val}" onclick="evaluateAnswer(this)"> ${opts[1].text}</label>
                        <label class="option-label"><input type="radio" name="q${qItem.id}" value="${opts[2].val}" onclick="evaluateAnswer(this)"> ${opts[2].text}</label>
                    </div>
                `;
                pageDiv.appendChild(qCard);
            }
            container.appendChild(pageDiv);
        }
    }

    // පිටු මාරු කිරීමේ පාලනය
    function changePage(direction) {
        document.getElementById(`page${currentPage}`).classList.remove('active');
        currentPage += direction;

        if (currentPage > totalPages) {
            currentPage = totalPages;
            calculateTotalScore();
            return;
        }

        document.getElementById(`page${currentPage}`).classList.add('active');
        
        // බොත්තම් වල තත්ත්වය වෙනස් කිරීම
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        
        if (currentPage === totalPages) {
            document.getElementById('nextBtn').innerText = "ප්‍රතිඵල බලන්න 🎯";
        } else {
            document.getElementById('nextBtn').innerText = "ඉදිරියට";
        }

        document.getElementById('pageIndicator').innerText = `පිටුව: ${currentPage} / ${totalPages}`;
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // පිළිතුරක් තෝරාගත් සැණින් පෙන්වන ක්‍රියාවලිය
    function evaluateAnswer(radioInput) {
        const optionsContainer = radioInput.closest('.options');
        const labels = optionsContainer.querySelectorAll('.option-label');
        
        labels.forEach(label => {
            label.classList.remove('correct-selected', 'wrong-selected');
        });

        if (radioInput.value === "correct") {
            radioInput.parentElement.classList.add('correct-selected');
        } else {
            radioInput.parentElement.classList.add('wrong-selected');
            const correctRadio = optionsContainer.querySelector('input[value="correct"]');
            if (correctRadio) {
                correctRadio.parentElement.classList.add('correct-selected');
            }
        }
    }

    // අවසාන ලකුණු එකතුව ගණනය කිරීම
    function calculateTotalScore() {
        let correctCount = 0;
        allQuestions.forEach(qItem => {
            const selected = document.querySelector(`input[name="q${qItem.id}"]:checked`);
            if (selected && selected.value === "correct") {
                correctCount++;
            }
        });

        const resultDiv = document.getElementById('result-section');
        const percentage = ((correctCount / allQuestions.length) * 100).toFixed(2);
        
        resultDiv.innerHTML = `
            🎉 පරීක්ෂණය සාර්ථකව අවසන් කරන ලදී!<br>
            मुළු ප්‍රශ්න සංඛ්‍යාව: ${allQuestions.length}<br>
            ඔබ ලබාගත් නිවැරදි පිළිතුරු ගණන: ${correctCount}<br>
            සමස්ත ප්‍රතිශතය: ${percentage}%
        `;
        resultDiv.style.display = 'block';
        window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
    }

    // කේතය මුලින්ම ක්‍රියාත්මක වන විට ජනනය කිරීම
    window.onload = generateQuiz;
</script>
